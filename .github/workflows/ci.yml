name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Mehrfach-Runs auf demselben Branch abbrechen – nur der jüngste zählt.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Production build
        run: npm run build
        env:
          # Build benötigt diese Vars nicht aktiv, aber Auth.js prüft sie
          # beim Modul-Load. Dummy-Werte reichen für den Build-Smoke.
          AUTH_SECRET: ci-dummy-secret-not-used-at-runtime
          AUTH_TRUST_HOST: 'true'
          AUTH_GOOGLE_ID: ci-dummy
          AUTH_GOOGLE_SECRET: ci-dummy
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
